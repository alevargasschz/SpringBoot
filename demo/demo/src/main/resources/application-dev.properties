# Esta es otra version de application.properties, se puede usar esta version para 
# el perfil "dev" y la otra version para el perfil "prod", 
# de esta manera se pueden tener diferentes configuraciones para cada entorno.

spring.application.name=demo
server.port=8081

# Configuración del contexto de la aplicación para que todas las rutas comiencen con /api
server.servlet.context-path=/api-dev

# Perfil activo para esta configuración, se puede cambiar a otro perfil si es necesario
# spring.profiles.active=dev

# Configuración de la base de datos H2 en memoria
# Se puede Modificar la base de datos
spring.datasource.url=jdbc:h2:mem:mydb

# Configuración del driver de la base de datos H2
# Se puede modificar la base de datos
spring.datasource.driver-class-name=org.h2.Driver

# Credenciales de la base de datos H2
spring.datasource.username=sa
spring.datasource.password=

# Configuración de JPA para crear y eliminar las tablas automáticamente al iniciar y cerrar la aplicación
spring.jpa.hibernate.ddl-auto=create-drop

# Habilitar la consola web de H2 para facilitar la visualización y manipulación de la base de datos en memoria
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console