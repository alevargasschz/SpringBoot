<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Agregar Usuario</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" th:href="@{/css/components/header.css}" />
        <link rel="stylesheet" th:href="@{/css/users/add.css}" />
    </head>
    <body>
        <div th:replace="~{components/header :: header}"></div>

        <div class="container">
            <h2>Agregar Usuario</h2>
            <form th:action="@{/users/add}" method="post">
                <div>
                    <label for="username">Nombre de Usuario:</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        maxlength="50"
                        required
                    />
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        maxlength="100"
                        required
                    />
                </div>
                <div>
                    <label for="password_hash">Contraseña:</label>
                    <input
                        type="password"
                        id="password_hash"
                        name="password_hash"
                        maxlength="255"
                        required
                    />
                </div>
                <div>
                    <label for="bio">Biografía:</label>
                    <textarea id="bio" name="bio" maxlength="500"></textarea>
                </div>
                <div>
                    <label for="birthdate">Fecha de Nacimiento:</label>
                    <input type="date" id="birthdate" name="birthdate" />
                </div>
                <div>
                    <label for="role">Rol:</label>
                    <select id="role" name="role" required>
                        <option
                            th:each="role : ${roles}"
                            th:value="${role.id}"
                            th:text="${role.name}"
                        ></option>
                    </select>
                </div>
                <div>
                    <button type="submit">Agregar Usuario</button>
                </div>
            </form>
        </div>
        <div th:replace="~{components/footer :: footer}"></div>
    </body>
</html>
