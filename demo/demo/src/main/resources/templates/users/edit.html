<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
</head>

<body>
    <div>
        <h2>Editar usuario</h2>
        <form th:action="@{/mvc/users/edit}" th:object="${user}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}">
            <div>
                <label for="username">Nombre de usuario:</label>
                <input type="text" id="username" th:field="*{username}" maxlength="50">
            </div>
            <div>
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" th:field="*{email}">
            </div>
            <div>
                <label for="passwordHash">Contraseña:</label>
                <input type="password" id="passwordHash" th:field="*{passwordHash}">
            </div>
            <div>
                <label for="bio">Biografía:</label>
                <textarea id="bio" th:field="*{bio}"></textarea>
            </div>
            <div>
                <select id="role" th:field="*{role.id}">
                    <option value="" disabled selected>Selecciona un rol</option>
                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}">Role Name</option>
                </select>
            </div>
            <div>
                <button type="submit">Guardar Cambios</button>
            </div>
        </form>
    </div>
</body>

</html>
