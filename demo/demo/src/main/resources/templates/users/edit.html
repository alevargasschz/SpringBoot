<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Editar Usuario</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" th:href="@{/css/components/header.css}" />
        <link rel="stylesheet" th:href="@{/css/users/edit.css}" />
    </head>
    <body>
        <div th:replace="~{components/header :: header}"></div>
        <div th:if="${actualUser == null}">
            <p>Usuario no encontrado.</p>
            <a th:href="@{/users}">Volver a la lista de usuarios</a>
        </div>
        <div th:if="${actualUser != null}" class="container">
            <h2>Editar Usuario</h2>
            <form th:action="@{/users/edit}" method="post">
                <input type="hidden" name="id" th:value="${actualUser.id}" />
                <div>
                    <label for="username">Nombre de Usuario:</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        maxlength="50"
                        th:value="${actualUser.username}"
                        required
                    />
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        maxlength="100"
                        th:value="${actualUser.email}"
                        required
                    />
                </div>
                <div>
                    <label for="password_hash">Contraseña:</label>
                    <input
                        type="password"
                        id="password_hash"
                        name="password_hash"
                        maxlength="255"
                    />
                </div>
                <div>
                    <label for="bio">Biografía:</label>
                    <textarea
                        id="bio"
                        name="bio"
                        maxlength="500"
                        th:text="${actualUser.bio}"
                    ></textarea>
                </div>
                <div>
                    <label for="birthdate">Fecha de Nacimiento:</label>
                    <input
                        type="date"
                        id="birthdate"
                        name="birthdate"
                        th:value="${actualUser.birthdate}"
                    />
                </div>
                <div>
                    <label for="role">Rol:</label>
                    <select id="role" name="role" required>
                        <option
                            th:each="role : ${roles}"
                            th:value="${role.id}"
                            th:text="${role.name}"
                            th:selected="${role.id == actualUser.role.id}"
                        ></option>
                    </select>
                </div>
                <div>
                    <button type="submit">Guardar Cambios</button>
                </div>
            </form>
        </div>
        <div th:replace="~{components/footer :: footer}"></div>
    </body>
</html>
